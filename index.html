<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SemiAMUN | Official Website</title>
    <!-- 引入 Tailwind CSS（直接通过网络拉取样式，无需本地安装） -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 font-sans text-slate-900">

    <!-- 顶部导航栏 (Navbar) -->
    <nav class="bg-white shadow-md w-full sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4">
            <div class="flex justify-between items-center py-4">
                
                <!-- Logo / 社团名称 -->
                <a href="#" class="text-2xl font-bold tracking-tighter text-blue-900">
                    SemiAMUN
                </a>
                
                <!-- 桌面端菜单 -->
                <div class="hidden md:flex space-x-6">
                    <a href="#" class="text-slate-600 hover:text-blue-600 font-medium transition">Home</a>
                    <a href="#committees" class="text-slate-600 hover:text-blue-600 font-medium transition">Committees</a>
                    <a href="#secretariat" class="text-slate-600 hover:text-blue-600 font-medium transition">Secretariat</a>
                    <a href="#schedule" class="text-slate-600 hover:text-blue-600 font-medium transition">Schedule</a>
                </div>

                <!-- 报名按钮 (后期可直接链接到 Google Forms) -->
                <div class="hidden md:flex">
                    <a href="#" class="bg-blue-600 text-white px-5 py-2 rounded shadow hover:bg-blue-700 transition font-semibold">
                        Register Now
                    </a>
                </div>
                
            </div>
        </div>
    </nav>

    <!-- 首页主视觉区域 (Hero Section) -->
    <header class="bg-blue-900 text-white py-24 text-center">
        <div class="max-w-4xl mx-auto px-4">
            <h1 class="text-5xl font-extrabold mb-6 tracking-tight">Welcome to SemiAMUN</h1>
            <p class="text-xl text-blue-200 mb-8 max-w-2xl mx-auto">
                Fostering diplomacy, debate, and critical thinking. Join us for a premier Model United Nations experience.
            </p>
            <a href="#committees" class="inline-block bg-white text-blue-900 px-8 py-3 rounded text-lg font-bold shadow-lg hover:bg-slate-100 transition">
                View Committees
            </a>
        </div>
    </header>

    <!-- 页面内容测试占位符 -->
    <main class="max-w-6xl mx-auto px-4 py-16 text-center">
        <h2 class="text-2xl font-bold text-slate-400">
            网站成功上线！这里稍后将用来放置具体的会议信息。
        </h2>
    </main>

</body>
</html>
